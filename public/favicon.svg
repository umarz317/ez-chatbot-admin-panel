<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004C3F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00362D;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background / Bubble -->
  <path d="M30,50 a20,20 0 0 1 20,-20 h100 a20,20 0 0 1 20,20 v80 a20,20 0 0 1 -20,20 h-30 l-20,20 l-20,-20 h-30 a20,20 0 0 1 -20,-20 z" 
        fill="url(#bubbleGradient)" filter="url(#shadow)" />

  <!-- Gear Icon (Admin/Settings) -->
  <g transform="translate(150, 40) scale(0.6)" fill="#ffffff" opacity="0.9">
    <path d="M50,15 l4,9 a25,25 0 0 1 9,4 l9,-4 l5,8 l-8,7 a25,25 0 0 1 0,10 l8,7 l-5,8 l-9,-4 a25,25 0 0 1 -9,4 l-4,9 h-10 l-4,-9 a25,25 0 0 1 -9,-4 l-9,4 l-5,-8 l8,-7 a25,25 0 0 1 0,-10 l-8,-7 l5,-8 l9,4 a25,25 0 0 1 9,-4 l4,-9 h10 z M45,40 a10,10 0 1 0 20,0 a10,10 0 1 0 -20,0" />
  </g>

  <!-- EZ Branding -->
  <g fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="50">
    <text x="55" y="115">EZ</text>
  </g>
</svg>
